<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shove a Penny - Dart Tracker</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --card-color: #1f2833;
            --accent-color: #ff9f1c;
            --text-color: #c5c6c7;
            --white: #ffffff;
            --success: #2ec4b6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background-color: var(--card-color);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            text-align: center;
            border: 1px solid #333;
        }

        .header-title-container {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin-bottom: 20px;
}

.title-logo {
  height: 48px; /* Adjust height as needed to fit your heading size */
  width: auto;
  object-fit: contain;
}

/* Optional: if you no longer need the big centered logo container */
.logo-container {
  display: none;
}
        .logo-container img {
            max-width: 250px;
            height: auto;
            margin-bottom: 10px;
            border-radius: 50%;
        }

        h1, h2, h3 {
            color: var(--accent-color);
            margin-top: 5px;
        }

        .setup-screen, .game-screen, .winner-screen {
            display: none;
        }

        .active {
            display: block;
        }

        input[type="text"] {
            padding: 10px;
            width: 60%;
            border-radius: 6px;
            border: 1px solid #444;
            background-color: #0b0c10;
            color: white;
            font-size: 16px;
            margin-bottom: 10px;
        }

        button {
            background-color: var(--accent-color);
            color: black;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s ease;
            margin: 5px;
        }

        button:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.45;
            transform: none;
        }

        .player-list-setup {
            margin: 15px 0;
            text-align: left;
            display: inline-block;
        }

        /* Game Interface Layout */
        .turn-indicator {
            background-color: #151c24;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 5px solid var(--accent-color);
        }

        .dart-dots {
            display: inline-flex;
            gap: 10px;
            margin-top: 5px;
        }

        .dot {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background-color: #444;
        }

        .dot.active {
            background-color: var(--accent-color);
            box-shadow: 0 0 8px var(--accent-color);
        }

        /* Scoreboard Grid */
        .grid-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background-color: #151c24;
        }

        th, td {
            border: 1px solid #333;
            padding: 12px 8px;
            text-align: center;
        }

        th {
            background-color: #0b0c10;
            color: var(--accent-color);
        }

        .current-player-col {
            background-color: rgba(255, 159, 28, 0.1);
        }

        .closed-cell {
            color: var(--success);
            font-weight: bold;
        }

        .game-actions {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 16px;
        }

        /* Input Controls */
        .input-pad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 20px 0;
        }

        .input-pad button {
            background-color: #2c3540;
            color: white;
            padding: 15px 5px;
            font-size: 18px;
        }

        .input-pad button.bullseye {
            grid-column: span 2;
            background-color: #8b0000;
        }

        .input-pad button.miss {
            grid-column: span 2;
            background-color: #444;
        }

        .multiplier-select {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .mult-btn {
            flex: 1;
            background-color: #444;
            color: white;
        }

        .mult-btn.selected {
            background-color: var(--accent-color);
            color: black;
        }

        .shove-alert {
            background-color: #4a154b;
            color: white;
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
            display: none;
            font-weight: bold;
            animation: flash 0.5s alternate infinite;
        }

        @keyframes flash {
            from { opacity: 0.8; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

<div class="container">
  <div class="header-title-container">
    <img src="ShoveaPenny4.png" alt="Shove a Penny Logo" class="title-logo">
    <h1>Shove a Penny</h1>
  </div>

    <div id="setup-screen" class="setup-screen active">
        <h2>Game Setup</h2>
        <div>
            <input type="text" id="player-name-input" placeholder="Enter Player Name" autocomplete="off">
            <button onclick="addPlayer()">Add Player</button>
        </div>
        <div class="player-list-setup">
            <h3>Players Joined:</h3>
            <ol id="player-list-ol"></ol>
        </div>
        <br>
        <button id="start-game-btn" onclick="startGame()" style="font-size: 20px; padding: 15px 30px; display:none;">Start Game</button>
    </div>

    <div id="game-screen" class="game-screen">
        <div class="turn-indicator">
            <h2 id="current-player-display">Player's Turn</h2>
            <div>Dart: 
                <div class="dart-dots">
                    <div id="dot1" class="dot active"></div>
                    <div id="dot2" class="dot active"></div>
                    <div id="dot3" class="dot active"></div>
                </div>
            </div>
            <div id="shove-alert" class="shove-alert"></div>
        </div>

        <div class="multiplier-select">
            <button id="m1" class="mult-btn selected" onclick="setMultiplier(1)">Single</button>
            <button id="m2" class="mult-btn" onclick="setMultiplier(2)">Double</button>
            <button id="m3" class="mult-btn" onclick="setMultiplier(3)">Triple</button>
        </div>

        <div class="input-pad" id="hit-buttons-container">
            </div>

        <h3>Scoreboard</h3>
        <p style="font-size: 13px; color: #888;">(Target closes at 3 hits. Extra hits shove to the next open player!)</p>
        <div class="grid-container">
            <table id="scoreboard-table">
                </table>
        </div>
        
        <div class="game-actions">
            <button id="undo-score-btn" onclick="undoLastScore()" style="background-color: #2ec4b6; color: black;" disabled>Undo Score</button>
            <button onclick="resetGame()" style="background-color: #444; color: white;">Restart Game</button>
        </div>
    </div>

    <div id="winner-screen" class="winner-screen">
        <h1 style="font-size: 45px; color: var(--success);">🏆 Winner! 🏆</h1>
        <h2 id="winner-name-display" style="font-size: 32px; color: white;">Player</h2>
        <p>Has successfully shoved all their pennies and closed all targets!</p>
        <h3>Final Scoreboard</h3>
        <div class="grid-container">
            <table id="final-scoreboard-table">
                </table>
        </div>
        <br>
        <button onclick="undoLastScore()" style="background-color: #2ec4b6; color: black; font-size: 20px; padding: 15px 30px;">Undo Last Score</button>
        <button onclick="resetGame()" style="font-size: 20px; padding: 15px 30px;">Play Again</button>
    </div>
</div>

<script>
  // Game Rules Config
  const TARGETS = [20, 19, 18, 17, 16, 15, 14, 13, 12, 11, 10, 9, 8, 7, 6, 5, 'B'];
  const MAX_HITS = 3;

  let players = [];
  let currentPlayerIndex = 0;
  let currentDart = 1;
  let selectedMultiplier = 1;
  let history = [];
  let shoveMessage = '';

  function addPlayer() {
    const input = document.getElementById('player-name-input');
    const name = input.value.trim();
    if (!name) return;
    players.push({
      name,
      scores: Object.fromEntries(TARGETS.map(target => [target, 0])),
      totalMarks: 0,
      penniesPushed: 0
    });
    input.value = '';
    renderSetupPlayers();
    document.getElementById('start-game-btn').style.display = players.length >= 2 ? 'inline-block' : 'none';
    input.focus();
  }

  function renderSetupPlayers() {
    const list = document.getElementById('player-list-ol');
    list.innerHTML = players.map(player => `<li>${escapeHtml(player.name)}</li>`).join('');
  }

  function startGame() {
    if (players.length < 2) return;
    currentPlayerIndex = 0;
    currentDart = 1;
    selectedMultiplier = 1;
    history = [];
    document.getElementById('setup-screen').classList.remove('active');
    document.getElementById('winner-screen').classList.remove('active');
    document.getElementById('game-screen').classList.add('active');
    buildHitButtons();
    setMultiplier(1);
    updateGameView();
  }

  function buildHitButtons() {
    const container = document.getElementById('hit-buttons-container');
    container.innerHTML = TARGETS.map(target => {
      const className = target === 'B' ? ' class="bullseye"' : '';
      const label = target === 'B' ? 'Bull' : target;
      return `<button${className} onclick="recordHit('${target}')">${label}</button>`;
    }).join('') + '<button class="miss" onclick="recordMiss()">Miss</button>';
  }

  function setMultiplier(multiplier) {
    selectedMultiplier = multiplier;
    [1, 2, 3].forEach(value => {
      document.getElementById(`m${value}`).classList.toggle('selected', value === multiplier);
    });
  }

  function applyHits(playerIndex, target, hits) {
    const player = players[playerIndex];
    const currentHits = player.scores[target];
    const room = MAX_HITS - currentHits;
    const keptHits = Math.min(room, hits);
    const extraHits = hits - keptHits;

    player.totalMarks += hits; 
    player.scores[target] += keptHits;

    if (extraHits > 0) {
      shoveHits(playerIndex, target, extraHits);
    }
  }

  function shoveHits(fromPlayerIndex, target, hits) {
    const shoveSourcePlayer = players[fromPlayerIndex];
    const shovedTo = [];
    let remaining = hits;

    for (let offset = 1; offset < players.length && remaining > 0; offset++) {
      const nextIndex = (fromPlayerIndex + offset) % players.length;
      const nextPlayer = players[nextIndex];
      const room = MAX_HITS - nextPlayer.scores[target];
      if (room <= 0) continue;

      const given = Math.min(room, remaining);
      nextPlayer.scores[target] += given;
      shoveSourcePlayer.penniesPushed += given;

      remaining -= given;
      shovedTo.push(`${given} to ${nextPlayer.name}`);
    }

    if (shovedTo.length) {
      shoveMessage = `Shoved ${target}: ${shovedTo.join(', ')}`;
    }
  }

  function recordHit(target) {
    shoveMessage = '';
    saveHistory();
    applyHits(currentPlayerIndex, target, selectedMultiplier);
    completeDart();
  }

  function recordMiss() {
    shoveMessage = '';
    saveHistory();
    completeDart();
  }

  function completeDart() {
    if (hasWon(players[currentPlayerIndex])) {
      showWinner(players[currentPlayerIndex]);
      return;
    }

    if (currentDart >= 3) {
      currentDart = 1;
      currentPlayerIndex = (currentPlayerIndex + 1) % players.length;
    } else {
      currentDart++;
    }
    setMultiplier(1);
    updateGameView();
  }

  function clonePlayers(playerList) {
    return playerList.map(player => ({
      name: player.name,
      scores: { ...player.scores },
      totalMarks: player.totalMarks,
      penniesPushed: player.penniesPushed
    }));
  }

  function saveHistory() {
    history.push({
      players: clonePlayers(players),
      currentPlayerIndex,
      currentDart,
      selectedMultiplier
    });
  }

  function undoLastScore() {
    const previous = history.pop();
    if (!previous) return;
    players = previous.players;
    currentPlayerIndex = previous.currentPlayerIndex;
    currentDart = previous.currentDart;
    selectedMultiplier = previous.selectedMultiplier;
    shoveMessage = '';
    document.getElementById('winner-screen').classList.remove('active');
    document.getElementById('setup-screen').classList.remove('active');
    document.getElementById('game-screen').classList.add('active');
    updateGameView();
  }

  function updateGameView() {
    document.getElementById('current-player-display').textContent = `${players[currentPlayerIndex].name}'s Turn`;
    const alert = document.getElementById('shove-alert');
    alert.textContent = shoveMessage;
    alert.style.display = shoveMessage ? 'block' : 'none';
    document.getElementById('undo-score-btn').disabled = history.length === 0;

    [1, 2, 3].forEach(value => {
      document.getElementById(`dot${value}`).classList.toggle('active', value >= currentDart);
    });

    setMultiplier(selectedMultiplier);
    renderScoreboard('scoreboard-table');
  }

  function showWinner(player) {
    document.getElementById('game-screen').classList.remove('active');
    document.getElementById('winner-screen').classList.add('active');
    document.getElementById('winner-name-display').textContent = player.name;
    
    renderScoreboard('final-scoreboard-table');
    
    const finalTable = document.getElementById('final-scoreboard-table');

    // Header row identifying player names for the summary section
    const summaryHeaderRow = `
      <tr style="border-top: 3px solid var(--accent-color); background-color: #0b0c10;">
        <th>Stat Summary</th>
        ${players.map(p => `<th style="color: var(--accent-color);">${escapeHtml(p.name)}</th>`).join('')}
      </tr>
    `;

    const totalMarksRow = `
      <tr style="font-weight: bold;">
        <th>Total Marks</th>
        ${players.map(p => `<td>${p.totalMarks}</td>`).join('')}
      </tr>
    `;

    const penniesPushedRow = `
      <tr style="font-weight: bold; color: var(--accent-color);">
        <th>Pennies Pushed</th>
        ${players.map(p => `<td>${p.penniesPushed}</td>`).join('')}
      </tr>
    `;

    finalTable.innerHTML += summaryHeaderRow + totalMarksRow + penniesPushedRow;
  }

  function renderScoreboard(tableId) {
    const table = document.getElementById(tableId);
    const header = [
      '<tr><th>Target</th>',
      ...players.map((player, index) => `<th class="${index === currentPlayerIndex ? 'current-player-col' : ''}">${escapeHtml(player.name)}</th>`),
      '</tr>'
    ].join('');

    const rows = TARGETS.map(target => {
      const label = target === 'B' ? 'Bull' : target;
      const cells = players.map((player, index) => {
        const hits = player.scores[target];
        const marks = hits >= MAX_HITS ? 'Closed' : '●'.repeat(hits);
        const classes = [
          hits >= MAX_HITS ? 'closed-cell' : '',
          index === currentPlayerIndex ? 'current-player-col' : ''
        ].filter(Boolean).join(' ');
        return `<td class="${classes}">${marks || '-'}</td>`;
      }).join('');
      return `<tr><th>${label}</th>${cells}</tr>`;
    }).join('');

    table.innerHTML = header + rows;
  }

  function hasWon(player) {
    return TARGETS.every(target => player.scores[target] >= MAX_HITS);
  }

  function resetGame() {
    players = [];
    currentPlayerIndex = 0;
    currentDart = 1;
    selectedMultiplier = 1;
    history = [];
    shoveMessage = '';
    document.getElementById('game-screen').classList.remove('active');
    document.getElementById('winner-screen').classList.remove('active');
    document.getElementById('setup-screen').classList.add('active');
    document.getElementById('player-name-input').value = '';
    document.getElementById('player-list-ol').innerHTML = '';
    document.getElementById('start-game-btn').style.display = 'none';
  }

  function escapeHtml(value) {
    const div = document.createElement('div');
    div.textContent = value;
    return div.innerHTML;
  }

  document.getElementById('player-name-input').addEventListener('keydown', event => {
    if (event.key === 'Enter') {
      addPlayer();
    }
  });
</script>
</body>
</html>
