<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shove a Penny - Dart Tracker</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --card-color: #1f2833;
            --accent-color: #ff9f1c;
            --text-color: #c5c6c7;
            --white: #ffffff;
            --success: #2ec4b6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background-color: var(--card-color);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            text-align: center;
            border: 1px solid #333;
        }

        .logo-container img {
            max-width: 250px;
            height: auto;
            margin-bottom: 10px;
            border-radius: 50%;
        }

        h1, h2, h3 {
            color: var(--accent-color);
            margin-top: 5px;
        }

        .setup-screen, .game-screen, .winner-screen {
            display: none;
        }

        .active {
            display: block;
        }

        input[type="text"] {
            padding: 10px;
            width: 60%;
            border-radius: 6px;
            border: 1px solid #444;
            background-color: #0b0c10;
            color: white;
            font-size: 16px;
            margin-bottom: 10px;
        }

        button {
            background-color: var(--accent-color);
            color: black;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s ease;
            margin: 5px;
        }

        button:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        .player-list-setup {
            margin: 15px 0;
            text-align: left;
            display: inline-block;
        }

        /* Game Interface Layout */
        .turn-indicator {
            background-color: #151c24;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 5px solid var(--accent-color);
        }

        .dart-dots {
            display: inline-flex;
            gap: 10px;
            margin-top: 5px;
        }

        .dot {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background-color: #444;
        }

        .dot.active {
            background-color: var(--accent-color);
            box-shadow: 0 0 8px var(--accent-color);
        }

        /* Scoreboard Grid */
        .grid-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background-color: #151c24;
        }

        th, td {
            border: 1px solid #333;
            padding: 12px 8px;
            text-align: center;
        }

        th {
            background-color: #0b0c10;
            color: var(--accent-color);
        }

        .current-player-col {
            background-color: rgba(255, 159, 28, 0.1);
        }

        .closed-cell {
            color: var(--success);
            font-weight: bold;
        }

        /* Input Controls */
        .input-pad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 20px 0;
        }

        .input-pad button {
            background-color: #2c3540;
            color: white;
            padding: 15px 5px;
            font-size: 18px;
        }

        .input-pad button.bullseye {
            grid-column: span 2;
            background-color: #8b0000;
        }

        .input-pad button.miss {
            grid-column: span 2;
            background-color: #444;
        }

        .multiplier-select {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .mult-btn {
            flex: 1;
            background-color: #444;
            color: white;
        }

        .mult-btn.selected {
            background-color: var(--accent-color);
            color: black;
        }

        .shove-alert {
            background-color: #4a154b;
            color: white;
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
            display: none;
            font-weight: bold;
            animation: flash 0.5s alternate infinite;
        }

        @keyframes flash {
            from { opacity: 0.8; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container">
        <img src="R7qT56q5.jpg" alt="Shove a Penny Logo">
    </div>

    <div id="setup-screen" class="setup-screen active">
        <h2>Game Setup</h2>
        <div>
            <input type="text" id="player-name-input" placeholder="Enter Player Name" autocomplete="off">
            <button onclick="addPlayer()">Add Player</button>
        </div>
        <div class="player-list-setup">
            <h3>Players Joined:</h3>
            <ol id="player-list-ol"></ol>
        </div>
        <br>
        <button id="start-game-btn" onclick="startGame()" style="font-size: 20px; padding: 15px 30px; display:none;">Start Game</button>
    </div>

    <div id="game-screen" class="game-screen">
        <div class="turn-indicator">
            <h2 id="current-player-display">Player's Turn</h2>
            <div>Dart: 
                <div class="dart-dots">
                    <div id="dot1" class="dot active"></div>
                    <div id="dot2" class="dot active"></div>
                    <div id="dot3" class="dot active"></div>
                </div>
            </div>
            <div id="shove-alert" class="shove-alert"></div>
        </div>

        <div class="multiplier-select">
            <button id="m1" class="mult-btn selected" onclick="setMultiplier(1)">Single</button>
            <button id="m2" class="mult-btn" onclick="setMultiplier(2)">Double</button>
            <button id="m3" class="mult-btn" onclick="setMultiplier(3)">Triple</button>
        </div>

        <div class="input-pad" id="hit-buttons-container">
            </div>

        <h3>Scoreboard</h3>
        <p style="font-size: 13px; color: #888;">(Target closes at 3 hits. Extra hits shove to the next open player!)</p>
        <div class="grid-container">
            <table id="scoreboard-table">
                </table>
        </div>
        
        <br>
        <button onclick="resetGame()" style="background-color: #444; color: white;">Restart Game</button>
    </div>

    <div id="winner-screen" class="winner-screen">
        <h1 style="font-size: 45px; color: var(--success);">🏆 Winner! 🏆</h1>
        <h2 id="winner-name-display" style="font-size: 32px; color: white;">Player</h2>
        <p>Has successfully shoved all their pennies and closed all targets!</p>
        <br>
        <button onclick="resetGame()" style="font-size: 20px; padding: 15px 30px;">Play Again</button>
    </div>
</div>
